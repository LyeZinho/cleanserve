name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            ext: tar.gz
            binary: cleanserve
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: tar.gz
            binary: cleanserve
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: tar.gz
            binary: cleanserve
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: zip
            binary: cleanserve.exe

    name: Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          case "${{ matrix.os }}" in
            ubuntu-latest)  OS="linux" ;;
            macos-latest)   OS="darwin" ;;
            windows-latest) OS="windows" ;;
          esac
          case "${{ matrix.target }}" in
            x86_64-*)   ARCH="x86_64" ;;
            aarch64-*)  ARCH="aarch64" ;;
          esac
          NAME="cleanserve-${OS}-${ARCH}"
          cd target/${{ matrix.target }}/release/
          if [ "${{ matrix.ext }}" = "tar.gz" ]; then
            tar -czf "${NAME}.tar.gz" ${{ matrix.binary }}
          else
            powershell -Command "Compress-Archive -Path ${{ matrix.binary }} -DestinationPath '${NAME}.zip'"
          fi
          echo "name=${NAME}" >> $GITHUB_OUTPUT

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: target/${{ matrix.target }}/release/${{ steps.package.outputs.name }}.${{ matrix.ext }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
