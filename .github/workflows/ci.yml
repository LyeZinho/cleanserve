name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-linux:
    name: Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add target
        run: rustup target add x86_64-unknown-linux-gnu
      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-gnu
      - name: Run tests
        run: cargo test --release --target x86_64-unknown-linux-gnu

  test-linux-multidistro:
    name: Test (Linux Distros)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: arch
            image: archlinux:latest
          - distro: fedora
            image: fedora:latest
    container:
      image: ${{ matrix.image }}
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: |
          if [ "${{ matrix.distro }}" = "arch" ]; then
            pacman -Sy --noconfirm base-devel
          elif [ "${{ matrix.distro }}" = "fedora" ]; then
            dnf install -y gcc
          fi
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Build
        run: cargo build --release
      - name: Run tests
        run: cargo test --release

  test-macos:
    name: Test (macOS)
    runs-on: macos-latest
    continue-on-error: true  # TODO: Investigate macOS test compilation failure (exit code 101)
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: cargo build --release
      - name: Run tests
        run: cargo test --release

  test-windows:
    name: Test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add targets
        run: rustup target add x86_64-pc-windows-msvc aarch64-pc-windows-msvc
      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc
      - name: Run tests
        run: cargo test --release --target x86_64-pc-windows-msvc
